name: Check PostgreSQL client

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for new PostgreSQL major version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current=$(grep -oP 'postgresql-client-\K\d+' Dockerfile)
          latest=$(curl -s 'https://registry.hub.docker.com/v2/repositories/library/postgres/tags/?page_size=100&ordering=last_updated' \
            | python3 -c "
          import json, sys
          tags = json.load(sys.stdin)['results']
          majors = set()
          for t in tags:
              name = t['name']
              if name.isdigit():
                  majors.add(int(name))
          print(max(majors))
          ")

          echo "Current: $current, Latest: $latest"

          if [ "$latest" -le "$current" ]; then
            echo "Up to date."
            exit 0
          fi

          branch="deps/postgresql-client-$latest"
          if gh pr list --state open --head "$branch" --json number --jq 'length' | grep -q '^[1-9]'; then
            echo "PR already exists."
            exit 0
          fi

          git checkout -b "$branch"
          sed -i "s/postgresql-client-$current/postgresql-client-$latest/" Dockerfile
          git add Dockerfile
          git commit -m "Update PostgreSQL client to $latest"
          git push -u origin "$branch"

          gh pr create \
            --title "Update PostgreSQL client to $latest" \
            --label dependencies \
            --body "PostgreSQL $latest is available (currently on $current).

          Verify that your PostgreSQL servers are compatible with client version $latest before merging."
