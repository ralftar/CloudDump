name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest pytest-cov ruff croniter

      - name: Lint with ruff
        run: ruff check clouddump tests

      - name: Run unit tests with coverage
        id: unit
        run: |
          set -o pipefail
          python -m pytest tests/test_unit.py tests/test_runners.py -v --tb=short --junitxml=unit-results.xml --cov=clouddump --cov-report=term-missing --cov-report=json:coverage.json 2>&1 | tee unit-output.txt

      - name: Extract coverage percentage
        id: coverage
        if: always()
        run: |
          if [ -f coverage.json ]; then
            PCT=$(python3 -c "import json; print(round(json.load(open('coverage.json'))['totals']['percent_covered']))")
            echo "percent=$PCT" >> "$GITHUB_OUTPUT"
            echo "Coverage: ${PCT}%"
          fi

      - name: Unit test summary
        if: always()
        run: |
          echo "## Unit Tests" >> "$GITHUB_STEP_SUMMARY"
          if [ -f unit-output.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -20 unit-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Unit tests did not run (earlier step failed)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: |
            unit-results.xml
            unit-output.txt
            coverage.json

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.build.outputs.build_time }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        id: build
        run: |
          START=$SECONDS
          docker buildx build --load --cache-from type=gha --cache-to type=gha,mode=max -t clouddump:ci-test .
          echo "build_time=$((SECONDS - START))s" >> "$GITHUB_OUTPUT"

      - name: Smoke test bundled tools
        id: smoke
        if: success()
        run: |
          set -o pipefail
          {
            echo "## Tool Smoke Tests"
            echo ""
            PASS=0
            FAIL=0
            for tool in "github-backup --help" "git --version" "aws --version" "azcopy --version" "pg_dump --version" "psql --version" "mysqldump --version" "mysql --version"; do
              name=$(echo "$tool" | cut -d' ' -f1)
              if docker run --rm clouddump:ci-test $tool >/dev/null 2>&1; then
                echo "- :white_check_mark: \`$name\`"
                PASS=$((PASS + 1))
              else
                echo "- :x: \`$name\`"
                FAIL=$((FAIL + 1))
              fi
            done
            echo ""
            echo ""
            echo "$PASS passed, $FAIL failed"
          } | tee smoke-output.txt

      - name: Smoke test summary
        if: always()
        run: |
          if [ -f smoke-output.txt ]; then
            cat smoke-output.txt >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-results
          path: smoke-output.txt
          if-no-files-found: ignore

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    outputs:
      run_time: ${{ steps.timing.outputs.run_time }}
    steps:
      - uses: actions/checkout@v6

      - name: Pull compose images (cached by runner)
        run: |
          docker pull minio/minio &
          docker pull postgres:15 &
          docker pull mysql:8.0 &
          docker pull axllent/mailpit &
          docker pull minio/mc &
          wait

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        id: integration
        run: |
          set -o pipefail
          bash tests/integration/run.sh 2>&1 | tee integration-output.txt

      - name: Record run time
        id: timing
        if: always()
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          if [ "$elapsed" -ge 60 ]; then
            echo "run_time=$((elapsed / 60))m $((elapsed % 60))s" >> "$GITHUB_OUTPUT"
          else
            echo "run_time=${elapsed}s" >> "$GITHUB_OUTPUT"
          fi

      - name: Integration test summary
        if: always()
        run: |
          echo "## Integration Tests" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E "^\s*(PASS|FAIL|SKIP|===|WARNING)" integration-output.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: integration-output.txt

  post-comment:
    name: PR comment
    needs: [unit-tests, docker-build, integration-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Build comment body
        id: comment
        env:
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          DOCKER_RESULT: ${{ needs.docker-build.result }}
          DOCKER_TIME: ${{ needs.docker-build.outputs.build_time }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
          INTEGRATION_TIME: ${{ needs.integration-tests.outputs.run_time }}
        run: |
          SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          NOW=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          icon() { [ "$1" = "success" ] && echo ":white_check_mark:" || echo ":x:"; }

          UNIT_ICON=$(icon "$UNIT_RESULT")
          DOCKER_ICON=$(icon "$DOCKER_RESULT")
          INTEGRATION_ICON=$(icon "$INTEGRATION_RESULT")

          # Extract "90 passed in 0.23s" without the surrounding === lines
          UNIT_SUMMARY=""
          if [ -f unit-output.txt ]; then
            UNIT_SUMMARY=$(grep -oE '[0-9]+ passed[^=]*' unit-output.txt | tail -1 | sed 's/ *$//')
          fi

          # Extract coverage percentage
          COVERAGE=""
          if [ -f coverage.json ]; then
            COVERAGE=$(python3 -c "import json; print(str(round(json.load(open('coverage.json'))['totals']['percent_covered'])) + '%')" 2>/dev/null || true)
          fi
          if [ -n "$COVERAGE" ] && [ -n "$UNIT_SUMMARY" ]; then
            UNIT_SUMMARY="${UNIT_SUMMARY}, coverage ${COVERAGE}"
          fi

          # Extract "12 passed, 0 failed" from integration output
          INTEGRATION_SUMMARY=""
          if [ -f integration-output.txt ]; then
            INTEGRATION_SUMMARY=$(grep -oE '[0-9]+ passed, [0-9]+ failed' integration-output.txt | tail -1)
          fi
          if [ -n "$INTEGRATION_TIME" ] && [ -n "$INTEGRATION_SUMMARY" ]; then
            INTEGRATION_SUMMARY="${INTEGRATION_SUMMARY} in ${INTEGRATION_TIME}"
          fi

          # Extract "8 passed, 0 failed" from smoke output
          SMOKE_SUMMARY=""
          SMOKE_BODY=""
          if [ -f smoke-output.txt ]; then
            SMOKE_SUMMARY=$(grep -oE '[0-9]+ passed, [0-9]+ failed' smoke-output.txt | tail -1)
            SMOKE_BODY=$(cat smoke-output.txt)
          fi
          if [ -n "$DOCKER_TIME" ] && [ -n "$SMOKE_SUMMARY" ]; then
            SMOKE_SUMMARY="${SMOKE_SUMMARY} (build ${DOCKER_TIME})"
          fi

          # Build comment
          {
            echo "## CI Results"
            echo ""
            echo "| Test | Status | Details |"
            echo "|------|--------|---------|"
            echo "| Unit tests | ${UNIT_ICON} ${UNIT_RESULT} | ${UNIT_SUMMARY} |"
            echo "| Docker build + smoke | ${DOCKER_ICON} ${DOCKER_RESULT} | ${SMOKE_SUMMARY} |"
            echo "| Integration tests | ${INTEGRATION_ICON} ${INTEGRATION_RESULT} | ${INTEGRATION_SUMMARY} |"
            echo ""
            if [ -n "$SMOKE_BODY" ]; then
              echo "<details>"
              echo "<summary>Tool smoke tests</summary>"
              echo ""
              echo "$SMOKE_BODY"
              echo ""
              echo "</details>"
              echo ""
            fi
            if [ -f unit-output.txt ]; then
              echo "<details>"
              echo "<summary>Unit test output</summary>"
              echo ""
              echo '```'
              cat unit-output.txt
              echo '```'
              echo ""
              echo "</details>"
              echo ""
            fi
            if [ -f integration-output.txt ]; then
              echo "<details>"
              echo "<summary>Integration test output</summary>"
              echo ""
              echo '```'
              tail -80 integration-output.txt
              echo '```'
              echo ""
              echo "</details>"
              echo ""
            fi
            echo "---"
            echo "*Last run: ${NOW} | Commit: \`${SHA}\` | [Action run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
            echo ""
            echo "<!-- ci-sticky-comment -->"
          } > comment-body.txt

      - name: Post or update sticky comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment-body.txt', 'utf8');
            const marker = '<!-- ci-sticky-comment -->';
            const prNumber = context.payload.pull_request.number;

            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
              console.log(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
              console.log('Created new comment');
            }
