name: Renovate

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v42
        with:
          configurationFile: renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}
