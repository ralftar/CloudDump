name: Publish

on:
  release:
    types: [published, deleted]

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/clouddump

jobs:
  publish:
    name: Build and push Docker image
    if: github.event.action == 'published'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tags
        id: tags
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          TAGS="${IMAGE}:${VERSION}"
          if [ "${{ github.event.release.prerelease }}" = "false" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Patch version
        run: sed -i "s/0.0.0/${{ steps.tags.outputs.version }}/" clouddump/__init__.py

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  cleanup:
    name: Delete image and tag
    if: github.event.action == 'deleted'
    runs-on: ubuntu-latest
    steps:
      - name: Delete git tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          git push --delete origin "refs/tags/${TAG}" 2>/dev/null || echo "Tag ${TAG} already deleted or not found"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete GHCR image tag
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.payload.release.tag_name;
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const pkg = repo.toLowerCase();

            // List all versions, find the one with this tag
            const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
              package_type: 'container',
              package_name: pkg,
              username: owner,
              per_page: 100,
            }).catch(() => ({ data: [] }));

            const version = versions.data.find(v =>
              v.metadata?.container?.tags?.includes(tag)
            );

            if (version) {
              await github.rest.packages.deletePackageVersionForUser({
                package_type: 'container',
                package_name: pkg,
                username: owner,
                package_version_id: version.id,
              });
              console.log(`Deleted image version ${version.id} (tag: ${tag})`);
            } else {
              console.log(`No image found with tag: ${tag}`);
            }
