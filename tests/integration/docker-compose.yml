services:
  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"

  sshserver:
    image: atmoz/sftp
    command: testuser::1000:upload
    volumes:
      - ./test-keys/id_test.pub:/home/testuser/.ssh/keys/id_test.pub:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/22' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

  samba:
    image: dperson/samba
    command: >-
      -u "testuser;testpass"
      -s "testshare;/share;yes;no;no;testuser"
      -g "min protocol = SMB2"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 445 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  default:
    name: clouddump-integration
